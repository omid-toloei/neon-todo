<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/style.css" />
    <link rel="icon" type="image/svg+xml" href="Pics/favicon/favicon.svg">
    <title>To Do List</title>
  </head>
  <body>
    <main>
      <section class="main-section">
        <div class="app-title">
          <h1>To-Do list</h1>
          <p>Type your task here</p>
        </div>
        <div class="add-task">
          <input type="text" placeholder="type new task..." id="userEnteredTask" autocomplete="off">
          <button id="addBtn">+ add</button>
        </div>
        <div class="dividing-line"></div>
        <div class="app-tasks">
          <ul id="ulTask"></ul>
        </div>
        <div class="dividing-line"></div>
        <div class="app-info">
          <p class="app-info-txt">You have <span id="pendingTasks">0</span> unfinished tasks.</p>
          <button class="remove-all-btn" onclick="removeAllTasks()">remove all</button>
        </div>
      </section>
    </main>
  </body>
  <script src="javascript/app.js"></script>
</html>
